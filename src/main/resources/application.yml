server:
  port: 8082
  servlet:
    context-path: /api/v1

spring:
  application:
    name: ms-inspecciones
  profiles:
    active: dev

  datasource:
    url: jdbc:oracle:thin:@localhost:1521:XE
    username: ${DB_USERNAME:inspeccion_user}
    password: ${DB_PASSWORD:inspeccion_pass}
    driver-class-name: oracle.jdbc.OracleDriver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
    out-of-order: false
    table: FLYWAY_SCHEMA_HISTORY

services:
  territorial:
    url: ${TERRITORIAL_URL:http://ms-territorial:8081}

security:
  jwt:
    secret: ${JWT_SECRET:clave-secreta-inspeccion-2024-muy-larga-para-hmac-256}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    inspeccion: DEBUG
    org.springframework.jdbc.core: DEBUG
    org.springframework.security: INFO
